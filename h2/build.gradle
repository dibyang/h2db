task runLongRunJUnitCheck(type: Test) {
    description = 'Runs the standalone longrun JUnit checks.'
    testClassesDirs = sourceSets.longrunTest.output.classesDirs
    classpath = sourceSets.longrunTest.runtimeClasspath
    exclude '**/*$*.class'
