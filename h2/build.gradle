task runH2TestAllCi(type: JavaExec) {
    description = 'Runs the original H2 TestAll ci suite through Gradle.'
    dependsOn legacyTestClasses
    main = 'org.h2.test.TestAll'
    args 'ci', '-defaultMode', 'REGULAR'
    classpath = sourceSets.legacyTest.runtimeClasspath
    systemProperty 'file.encoding', 'UTF-8'
}

def legacyCiPhases = [
        'memory',
        'additional',
        'utils',
        'lazy-memory',
        'disk',
        'disk-additional',
        'network-memory',
        'network-lazy',
        'encrypted-disk'
]

task runH2TestAllCiPhaseReport(type: JavaExec) {
    description = 'Runs one TestAll ci phase for triage; use -Ph2CiPhase=<phase>.'
    dependsOn legacyTestClasses
    main = 'org.h2.test.TestAll'
    def selectedPhase = project.hasProperty('h2CiPhase') ? project.property('h2CiPhase') : 'memory'
    if (!legacyCiPhases.contains(selectedPhase)) {
        throw new GradleException("Unknown h2CiPhase: ${selectedPhase}. Expected one of ${legacyCiPhases}.")
    }
    args 'ci', '-defaultMode', 'REGULAR', '-phase', selectedPhase
    classpath = sourceSets.legacyTest.runtimeClasspath
    systemProperty 'file.encoding', 'UTF-8'
    ignoreExitValue = true
}

