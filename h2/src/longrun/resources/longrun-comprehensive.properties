run.name=mvstore-comprehensive
run.instance=comprehensive
run.duration=12h
run.seed=20260601
run.workDir=work/comprehensive
run.resume=false

workload.mode=mvstore
workload.keySpace=10000
workload.valueSizeMin=64
workload.valueSizeMax=4096
workload.ledgerMode=bounded
workload.ledgerMaxEntries=100000
workload.retentionTimeMillis=0
workload.versionsToKeep=0

metrics.interval=10s
progress.interval=30s
state.interval=10s
check.reopenInterval=10m

reclamation.enabled=true
reclamation.interval=10s
reclamation.maxCandidateChunks=64
reclamation.maxLiveBytesToRewriteMb=64
reclamation.maxRun=500
reclamation.maxTailCompaction=500
reclamation.minSchedulerInterval=0

crash.enabled=true
crash.interval=30m
crash.cycles=12

limits.maxDbSizeGb=2
