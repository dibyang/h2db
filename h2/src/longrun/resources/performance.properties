run.name=mvstore-performance
run.instance=performance
run.duration=3m
run.seed=20260601
run.workDir=work/performance
run.resume=false

workload.mode=mvstore
workload.keySpace=50000
workload.valueSizeMin=64
workload.valueSizeMax=8192
workload.ledgerMode=bounded
workload.ledgerMaxEntries=200000
workload.retentionTimeMillis=0
workload.versionsToKeep=0

metrics.interval=2s
progress.interval=15s
state.interval=5s
check.reopenInterval=0

reclamation.enabled=true
reclamation.interval=10s
reclamation.maxCandidateChunks=64
reclamation.maxLiveBytesToRewriteMb=64
reclamation.maxRun=250
reclamation.maxTailCompaction=250
reclamation.minSchedulerInterval=10000

crash.enabled=false
crash.interval=120s
crash.cycles=1

fault.enabled=false
fault.interval=120s
fault.kinds=truncate,bit-flip,zero-range,random-range,partial-page
fault.maxBytes=4096
fault.retainedCopies=5

limits.maxDbSizeGb=4
